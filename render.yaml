# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect this repo in Render → New → Blueprint, then set FRONTEND_URL after Vercel deploys.
services:
  - type: web
    name: sa-credit-scorecard-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: FRONTEND_URL
        sync: false
